<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surok</title>
    <link rel="stylesheet" href="stylesheets/style.css">
    <script defer src="javascripts/scripts.js"></script>
    <link rel="icon" href="images/surochek.svg">
</head>
<body>
    <div class="firstBlock">
        <div class="cloudDialog"></div>
        <div class="cloudColor"></div>
        <div class="cloudColor1"></div>
        <div class="cloudColor2"></div>
        <div class="cloudColor3"></div>
        <div class="surochek"></div>
        <div class="koresok1"></div>
        <div class="flower"></div>
        <div class="flower2"></div>
        <div class="flowerDialog"></div>
    </div>
    <div class="secondBlock">
        <div class="plate"></div>
        <div class="firstLeaf leaf1"></div>
        <div class="firstLeaf leaf2"></div>
        <div class="firstLeaf leaf3"></div>
        <div class="firstLeaf leaf4"></div>
        <div class="surochek2"></div>
        <div class="dialogSurochek2"></div>
    </div>
    <div class="thirdBlock">
        <input type="text" class="password-input" id="digit1" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" class="password-input" id="digit2" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" class="password-input" id="digit3" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" class="password-input" id="digit4" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>
    <div class="fourthBlock">
        <canvas id="drawingCanvas"></canvas>
            <div class="colorPicker">
                <div class="colorSquare color1" data-color="#000000"></div>
                <div class="colorSquare color2" data-color="#FF0000"></div>
            </div>
        <div class="berry"></div>
    </div>
    </div>
    <div class="fifthBlock">
        <div class="foooter"></div>
        <div class="surochekLast"></div>
        <div class="lastDialogSurochek"></div>
        <div class="footerLeaf">
            <div class="closeCorner"></div>
        </div>
    </div>
</body>
</html>
